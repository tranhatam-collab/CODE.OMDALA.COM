name = "omcode-api"
main = "src/index.ts"
compatibility_date = "2024-12-05"
compatibility_flags = ["nodejs_compat"]

[vars]
NODE_ENV = "production"
LOG_LEVEL = "info"

[observability]
enabled = true
head_sampling_rate = 1

[[d1_databases]]
binding = "DB"
database_name = "omcode_d1"
database_id = "your-d1-uuid-here"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "omcode_r2"

[[kv_namespaces]]
binding = "KV"
id = "your-kv-uuid-here"
